<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard to File</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #111;
    background: #f7f7f4;
    cursor: pointer;
  }
  main {
    width: min(560px, calc(100vw - 32px));
    padding: 40px 24px;
    text-align: center;
    border: 1px solid #ddd8ca;
    border-radius: 18px;
    background: #fffef9;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 22px;
    font-weight: 700;
  }
  p {
    margin: 0;
    color: #666;
    line-height: 1.6;
  }
  #status {
    min-height: 24px;
    margin-top: 22px;
    color: #0969da;
    font-size: 13px;
  }
  body.busy { cursor: progress; }
</style>
</head>
<body tabindex="0">
  <main>
    <h1>Click to download clipboard</h1>
    <p>Reads text from the clipboard and saves it as a timestamped .txt file.</p>
    <div id="status" aria-live="polite"></div>
  </main>
<script>
  const status = document.getElementById("status");

  function timestamp() {
    return new Date().toISOString().slice(0, 19).replace(/:/g, "-").replace("T", "_");
  }

  function downloadText(text) {
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `clipboard_${timestamp()}.txt`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function run() {
    if (document.body.classList.contains("busy")) return;

    document.body.classList.add("busy");
    status.textContent = "Reading clipboard...";

    try {
      const text = await navigator.clipboard.readText();
      if (!text) {
        status.textContent = "Clipboard text is empty.";
        return;
      }

      downloadText(text);
      status.textContent = `Downloaded ${text.length.toLocaleString()} characters.`;
    } catch (error) {
      status.textContent = error instanceof Error ? error.message : "Clipboard read failed.";
    } finally {
      document.body.classList.remove("busy");
    }
  }

  document.body.addEventListener("click", run);
  document.body.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      run();
    }
  });
</script>
</body>
</html>
